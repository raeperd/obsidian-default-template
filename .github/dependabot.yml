version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "11:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    cooldown:
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      linting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
      build-tools:
        patterns:
          - "@types/node"
          - "esbuild"
          - "tslib"
          - "typescript"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "11:30"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 2
    cooldown:
      default-days: 7
    groups:
      actions:
        patterns:
          - "*"
